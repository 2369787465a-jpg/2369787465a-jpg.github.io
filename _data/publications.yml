  - id: modeling-awards
    section: achievement
    badge:
      en: "Modeling Competitions"
      zh: "数学建模竞赛"
    image: "/images/publications/modeling-awards.svg"
    alt: "Mathematical modeling competition highlights"
    title: "Mathematical Modeling Competition Highlights"
    meta:
      home:
        en: "CUMCM 2025, ICM 2025, and APMCM 2024"
        zh: "2025 国赛、2025 美赛、2024 亚太赛"
      full:
        en: "Provincial Third Prize in CUMCM 2025, Meritorious Winner in ICM 2025, and First Prize in APMCM 2024"
        zh: "2025 全国大学生数学建模竞赛省三等奖、2025 美赛 Meritorious Winner、2024 亚太地区数学建模竞赛一等奖"
    summary:
      en: "Selected mathematical modeling experiences from undergraduate competitions."
      zh: "本科阶段参加过的几次数学建模竞赛经历。"
    bullets:
      en:
        - "CUMCM 2025: built a pipeline with linear mixed models, Weibull AFT, and two-stage XGBoost on 1,082 maternal clinical records."
        - "ICM 2025: analyzed cybersecurity policy effectiveness across 113 countries using clustering, LSTM, DID, and sensitivity analysis."
        - "APMCM 2024: modeled the global pet industry with ARIMA, grey forecasting, PSO, and differential equations under tariff shocks."
      zh:
        - "2025 国赛中处理 1082 条孕产妇临床记录，构建线性混合模型、Weibull AFT 与两阶段 XGBoost 流程。"
        - "2025 美赛中围绕 113 个国家的网络安全政策效果，完成聚类、LSTM、DID 与敏感性分析。"
        - "2024 亚太赛中结合 ARIMA、灰色预测、粒子群优化与微分方程建模分析全球宠物产业。"
