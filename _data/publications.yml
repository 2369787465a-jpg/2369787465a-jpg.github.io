items:
  - id: tsp-enhanced-strategies
    section: research
    badge:
      en: "Undergraduate Project"
      zh: "本科项目"
    image: "/images/publications/tsp-enhanced-strategies.svg"
    alt: "Deep reinforcement learning project for the traveling salesman problem"
    title: "Improved DRL Solver for the Traveling Salesman Problem with Enhanced Strategies"
    authors:
      en: "<strong>Lifeng Han</strong>"
      zh: "<strong>韩立峰</strong>"
    meta:
      home:
        en: "Sep. 2025 - Present"
        zh: "2025 年 9 月至今"
      full:
        en: "Provincial Undergraduate Innovation & Entrepreneurship Training Program | Sep. 2025 - Present"
        zh: "省级大学生创新创业训练计划项目 | 2025 年 9 月至今"
    summary:
      en: "An ongoing project on reinforcement learning methods for the traveling salesman problem."
      zh: "一个围绕旅行商问题强化学习方法展开的在研项目。"
    bullets:
      en:
        - "Built and tested a reinforcement learning pipeline for TSP instances."
        - "Explored encoder design, mixed local search actions, and feasibility constraints."
        - "Used PPO-based training and curriculum-style experiments for larger instances."
      zh:
        - "搭建并测试了一个面向 TSP 实例的强化学习求解流程。"
        - "尝试了编码器设计、局部搜索动作与可行性约束的结合。"
        - "使用 PPO 与课程式训练方式进行实验。"

  - id: cluster-aware-vrp
    section: research
    badge:
      en: "Research Project"
      zh: "科研项目"
    sci:
      en: "Q2 SCI"
      zh: "SCI Q2"
    image: "/images/publications/cluster-aware-vrp.svg"
    alt: "Cluster-aware vehicle routing research based on deep reinforcement learning"
    title: "Research on a Cluster-Aware Vehicle Routing Solver Based on Deep Reinforcement Learning"
    authors:
      en: "<strong>Lifeng Han</strong>"
      zh: "<strong>韩立峰</strong>"
    meta:
      home:
        en: "Sep. 2023 - Present"
        zh: "2023 年 9 月至今"
      full:
        en: "Cluster-aware routing research project | Sep. 2023 - Present"
        zh: "聚类感知路径优化研究项目 | 2023 年 9 月至今"
    summary:
      en: "A routing project that combines simulation data, transformer-based modeling, and reinforcement learning."
      zh: "一个结合仿真数据、Transformer 建模与强化学习的路径优化项目。"
    bullets:
      en:
        - "Built simulation datasets for clustered routing settings."
        - "Tested a dual-encoder and dual-decoder structure for route decisions."
        - "Implemented the training pipeline in PyTorch and completed basic comparison experiments."
      zh:
        - "构建了带聚类特征的路径优化仿真数据集。"
        - "测试了双编码器和双解码器的路径决策结构。"
        - "使用 PyTorch 搭建训练流程，并完成了基础对比实验。"

  - id: ozone-downscaling
    section: research
    badge:
      en: "Applied ML Project"
      zh: "应用机器学习项目"
    image: "/images/publications/ozone-downscaling.svg"
    alt: "Physics-consistent machine learning for ozone downscaling"
    title: "Physics-Consistent Machine Learning for High-Resolution Ozone Downscaling"
    authors:
      en: "Co-first author project"
      zh: "共同第一作者项目"
    meta:
      home:
        en: "Greater Bay Area ozone prediction | Nov. 2025 - Dec. 2025"
        zh: "大湾区臭氧降尺度预测 | 2025 年 11 月至 12 月"
      full:
        en: "Co-first author | High-resolution ozone downscaling in the Greater Bay Area | Nov. 2025 - Dec. 2025"
        zh: "共同第一作者 | 大湾区高分辨率臭氧降尺度研究 | 2025 年 11 月至 12 月"
    summary:
      en: "A short project on high-resolution ozone prediction using multi-source environmental data."
      zh: "一个使用多源环境数据进行高分辨率臭氧预测的短期项目。"
    bullets:
      en:
        - "Integrated simulation outputs, meteorological variables, and monitoring observations."
        - "Compared Random Forest, MLP, and XGBoost for the prediction task."
        - "Used SHAP analysis for a basic interpretation of model behavior."
      zh:
        - "整合了模拟输出、气象变量和地面监测观测数据。"
        - "比较了 Random Forest、MLP 和 XGBoost 等模型。"
        - "使用 SHAP 对模型结果做了基础解释。"

