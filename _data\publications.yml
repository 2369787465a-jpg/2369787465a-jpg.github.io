items:
  - id: tsp-enhanced-strategies
    section: research
    badge:
      en: "Provincial Innovation Program | Leader"
      zh: "省级大创项目 | 负责人"
    image: "/images/publications/tsp-enhanced-strategies.svg"
    alt: "Deep reinforcement learning project for the traveling salesman problem"
    title: "Improved DRL Solver for the Traveling Salesman Problem with Enhanced Strategies"
    authors:
      en: "<strong>Lifeng Han</strong>"
      zh: "<strong>韩立峰</strong>"
    meta:
      home:
        en: "Leader | Sep. 2025 - Present"
        zh: "负责人 | 2025 年 9 月至今"
      full:
        en: "Provincial Undergraduate Innovation & Entrepreneurship Training Program | Project leader | Sep. 2025 - Present"
        zh: "省级大学生创新创业训练计划项目 | 项目负责人 | 2025 年 9 月至今"
    summary:
      en: "Designed a traveling salesman problem solver that combines a DACT-style encoder, synthetic attention, mixed 2-opt/3-opt actions, feasibility masking, and PPO-based curriculum learning."
      zh: "面向旅行商问题设计了结合 DACT 风格编码器、合成注意力、2-opt/3-opt 混合动作空间、可行性掩码与 PPO 课程学习的强化学习求解器。"
    bullets:
      en:
        - "Benchmarked TSPLIB instances against strong routing baselines and redesigned the path representation with a DACT encoder, context positional encoding, and synthetic attention."
        - "Built a decoding strategy over mixed 2-opt and 3-opt moves, using feasibility masking to suppress invalid topological operations during search."
        - "Trained the policy with PPO and curriculum learning to improve convergence speed and generalization on larger instances."
      zh:
        - "以 TSPLIB 数据集为基准，对比多种经典算法，并设计了结合上下文位置编码与合成注意力的路径表示方式。"
        - "构建支持 2-opt 与 3-opt 的混合动作解码策略，并通过可行性掩码抑制无效拓扑操作。"
        - "采用 PPO 与课程学习联合训练，在收敛速度和大规模实例泛化上取得改进。"

  - id: cluster-aware-vrp
    section: research
    badge:
      en: "First-author Manuscript | Under Review"
      zh: "一作论文 | 在审"
    sci:
      en: "Q2 SCI"
      zh: "SCI Q2"
    image: "/images/publications/cluster-aware-vrp.svg"
    alt: "Cluster-aware vehicle routing research based on deep reinforcement learning"
    title: "Research on a Cluster-Aware Vehicle Routing Solver Based on Deep Reinforcement Learning"
    authors:
      en: "<strong>Lifeng Han</strong>"
      zh: "<strong>韩立峰</strong>"
    meta:
      home:
        en: "First author | Sep. 2023 - Present"
        zh: "第一作者 | 2023 年 9 月至今"
      full:
        en: "First-author project on cluster-aware pickup and delivery routing | Sep. 2023 - Present"
        zh: "面向聚类感知取送货路径优化的一作项目 | 2023 年 9 月至今"
    summary:
      en: "Constructed clustered and uniform simulation datasets, designed a dual-encoder transformer with masked intra-cluster attention, and built a dynamic dual-decoder for routing decisions."
      zh: "构建聚类与均匀分布仿真数据集，设计带簇内掩码注意力的双编码器 Transformer，并提出动态双解码器完成路径决策。"
    bullets:
      en:
        - "Defined an MDP for clustered routing and created PDP10-80 benchmarks that reflect region-node structure in urban logistics."
        - "Combined global attention and masked intra-cluster attention to preserve both whole-route context and local cluster structure."
        - "Implemented end-to-end PyTorch training with POMO-style sampling efficiency improvements and completed ablation plus cross-scale generalization analysis."
      zh:
        - "以城市物流中的区域-节点结构为出发点，建立了带聚类特征的 MDP 建模与 PDP10-80 仿真基准。"
        - "通过全局注意力与簇内掩码注意力的双编码器设计，同时保留全局上下文与局部聚类结构。"
        - "基于 PyTorch 完成端到端训练，并结合 POMO 思路提升采样效率，验证了模型的消融表现与跨尺度泛化能力。"

  - id: ozone-downscaling
    section: research
    badge:
      en: "Co-first Author Project"
      zh: "共同一作项目"
    image: "/images/publications/ozone-downscaling.svg"
    alt: "Physics-consistent machine learning for ozone downscaling"
    title: "Physics-Consistent Machine Learning for High-Resolution Ozone Downscaling"
    authors:
      en: "Co-first author project"
      zh: "共同第一作者项目"
    meta:
      home:
        en: "Greater Bay Area ozone prediction | Nov. 2025 - Dec. 2025"
        zh: "大湾区臭氧降尺度预测 | 2025 年 11 月至 12 月"
      full:
        en: "Co-first author | High-resolution ozone downscaling in the Greater Bay Area | Nov. 2025 - Dec. 2025"
        zh: "共同第一作者 | 大湾区高分辨率臭氧降尺度研究 | 2025 年 11 月至 12 月"
    summary:
      en: "Integrated chemical transport simulations, ERA5 meteorology, and monitoring observations into a heterogeneous feature system, then benchmarked interpretable machine learning models for refined ozone prediction."
      zh: "将化学输送模式输出、ERA5 气象数据与地面监测观测整合为异构特征体系，并比较多种可解释机器学习模型以实现精细化臭氧预测。"
    bullets:
      en:
        - "Integrated GEOS-Chem outputs, ERA5 meteorological variables, and ground-station measurements for multi-source feature engineering."
        - "Benchmarked Random Forest, MLP, and XGBoost, and selected XGBoost as the most effective model through statistical comparison."
        - "Used SHAP analysis to reveal temperature-driven nonlinear ozone formation patterns and validate consistency with atmospheric photochemistry."
      zh:
        - "融合 GEOS-Chem、ERA5 与地面站观测数据，构建面向臭氧精细化预测的多源异构特征工程系统。"
        - "比较 Random Forest、MLP 与 XGBoost 等模型，并通过统计检验确认 XGBoost 表现最优。"
        - "利用 SHAP 解释分析揭示温度主导的非线性臭氧生成机制与滴定效应，验证结果符合大气光化学规律。"

